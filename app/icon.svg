<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark green background circle -->
  <circle cx="16" cy="16" r="16" fill="#0a2f1b"/>
  <!-- White ball -->
  <circle cx="16" cy="16" r="12" fill="white" stroke="#4ade80" stroke-width="0.5"/>
  <!-- Soccer ball black patches -->
  <!-- Center pentagon -->
  <polygon points="16,8 19.8,10.6 18.4,15 13.6,15 12.2,10.6" fill="#1a1a1a"/>
  <!-- Top-left hex -->
  <polygon points="12.2,10.6 8.5,11.8 7.5,16 10.5,18.5 13.6,15" fill="#1a1a1a"/>
  <!-- Top-right hex -->
  <polygon points="19.8,10.6 23.5,11.8 24.5,16 21.5,18.5 18.4,15" fill="#1a1a1a"/>
  <!-- Bottom-left hex -->
  <polygon points="10.5,18.5 9,22 12,24 15.5,22.5 13.6,15" fill="#1a1a1a" opacity="0.85"/>
  <!-- Bottom-right hex -->
  <polygon points="21.5,18.5 23,22 20,24 16.5,22.5 18.4,15" fill="#1a1a1a" opacity="0.85"/>
